<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        div {
            position: relative;
            width: 500px;
            aspect-ratio: 1/1;
            background-repeat: no-repeat;
            background-color: #000000;
            background-image: conic-gradient(from 20deg, #00000025, #00ff0090);
            border-radius: 50%;
            animation: rotate 5000ms linear infinite;

            &::before {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 8px;
                aspect-ratio: 1/1;
                border-radius: 50%;
                background-color: #00ff00;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div></div>
</body>

</html>
