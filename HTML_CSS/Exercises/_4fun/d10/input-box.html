<!doctype html>
<html lang=en>
<meta charset=UTF-8>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Document</title>

<head>
    <style>
        html {
            font-family: Arial, Helvetica, sans-serif
        }

        .input-box {
            position: relative;
            width: 100px;

            input {
                width: 100%;
                padding: 10px 15px;
                border-radius: 99rem;
                outline: 0;
                border: 1px solid;
                transition: width .2s ease-in-out, border-radius .2s ease-in-out;
            }

            label {
                position: absolute;
                white-space: nowrap;
                top: 50%;
                left: 15px;
                font-size: 14px;
                transform: translateY(-50%);
                color: #1f1f1f;
                transition: top .2s ease-in-out, background-color .2s ease-in-out, padding .2s ease-in-out
            }

            input:focus,
            input:not(:placeholder-shown) {
                width: 150px;
                border-radius: 6px
            }

            input:focus+label,
            input:not(:placeholder-shown)+label {
                top: 0;
                background-color: #fff;
                padding-inline: 2px
            }
        }
    </style>
</head>

<body>
    <div class="input-box">
        <input id="any" placeholder=" ">
        <label for="any">Enter any</label>
    </div>
</body>

</html>
