<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

        }

        body {
            width: 100%;
            max-width: 956px;
            margin-inline: auto;
        }

        .hero {
            margin-top: 32px;
            width: 100%;
            height: 256px;
            background-image: linear-gradient(to right, #0073fe, #06c3fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 6px;
            border-radius: 16px;
            padding: 24px;
            color: #fff;

            .title {
                font-weight: 700;
                font-size: 24px;
            }

            .desc {
                font-weight: 400;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <main>
        <section class="hero">
            <div class="title">F8 On Facebook</div>
            <p class="desc">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Voluptatem suscipit tenetur ipsa
                animi necessitatibus nulla consectetur, facere qui quia harum at eius amet nesciunt praesentium sequi,
                vero cumque? Sunt, quasi.</p>
        </section>
    </main>
</body>

</html>
