<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .container {
            box-sizing: border-box;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(2, 100px);
            gap: 10px;
            justify-content: center;
            align-content: center;
            transition: all 1s ease-in-out;
        }

        .box {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            &:nth-child(1) {
                grid-row: 1 / 3;
            }
            &:nth-child(4) {
                grid-column: 2 / 4;
            }
            &:hover {
                scale: 1.125;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>

</html>
